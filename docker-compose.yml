# Piste B (API sur le PC, Node hors Docker) : lance seulement Postgres
#   npm run db:up
# Puis : cd server && npx prisma db push && npm run dev
# Téléphone USB : adb reverse tcp:3001 tcp:3001 + EXPO_PUBLIC_API_URL=http://127.0.0.1:3001 + npx expo run:android
#
# Option : service api = tout en Docker (docker compose up --build)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blyp
      POSTGRES_PASSWORD: blyp
      POSTGRES_DB: blyp
    ports:
      - "5432:5432"
    volumes:
      - blyp_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://blyp:blyp@db:5432/blyp
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-change-me}
      OTP_PEPPER: ${OTP_PEPPER:-dev-pepper-change-me}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      OBIT_SMS_KEY_API: ${OBIT_SMS_KEY_API:-}
      OBIT_SMS_SENDER: ${OBIT_SMS_SENDER:-}
      OBIT_SMS_BASE_URL: ${OBIT_SMS_BASE_URL:-}
    depends_on:
      - db

volumes:
  blyp_pgdata:
